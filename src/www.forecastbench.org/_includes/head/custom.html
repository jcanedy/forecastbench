<!-- start custom head snippets -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400&family=DM+Sans:ital,opsz,wght@0,9..40,300;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/logo/fri-icon-green.svg' | relative_url }}">

{% if page.head_css %}
  {% for script in page.head_css %}
    <link rel="stylesheet" href="{{ script | relative_url }}">
  {% endfor %}
{% endif %}

{% if page.head_scripts %}
  {% for script in page.head_scripts %}
    <script src="{{ script | relative_url }}"></script>
  {% endfor %}
{% endif %}


{% if site.staging %}
    <meta name="robots" content="noindex, nofollow">
{% endif %}

<!-- privacy-friendly -->
{% if jekyll.environment == "production" %}
<script defer data-domain="forecastbench.org" src="https://plausible.io/js/script.file-downloads.hash.outbound-links.js"></script>
{% else %}
<script defer data-domain="staging.forecastbench.org" src="https://plausible.io/js/script.file-downloads.hash.outbound-links.js"></script>
{% endif %}

<!-- insert favicons. use https://realfavicongenerator.net/ -->

<!-- end custom head snippets -->
